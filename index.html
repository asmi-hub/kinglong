<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>消防控制室值班表</title>
<style>
/* ===================== 基础样式 ===================== */
/* 全局样式重置：清除默认边距，统一盒模型，设置字体 */
* {margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif;}
/* 页面背景样式 */
body {background:#f0f0f0;padding:10px;}

/* ===================== 卡片布局样式 ===================== */
/* 页面主容器：控制整体宽度和卡片排列 */
.page-container {
  max-width:1200px; /* 缩小最大宽度，使整体更紧凑 */
  margin:0 auto;
  display: flex;
  flex-direction: column;
  gap: 15px; /* 两个卡片之间的间距 */
}
/* 通用卡片样式：所有卡片的基础样式 */
.card {
  background:#fff;
  border-radius:8px;
  box-shadow:0 2px 12px rgba(0,0,0,0.1);
  overflow:hidden;
  /* 缩小卡片内边距，使卡片整体更小 */
  padding: 0;
}

/* ===================== 值班表卡片样式 ===================== */
/* 值班表标题样式 */
.schedule-card h1 {
  background:#82c341;
  color:#fff;
  text-align:center;
  padding:12px 15px; /* 缩小标题内边距 */
  font-size:20px; /* 缩小标题字体 */
  margin:0;
}
/* 表格滚动容器 */
.table-wrapper {overflow-x:auto;scroll-behavior:smooth;}
/* 基础表格样式 */
table {width:100%;border-collapse:collapse;}

/* PC端单元格样式 - 缩小尺寸 */
th,td {
    border:1px solid #ddd;
    padding:8px 6px; /* 缩小单元格内边距 */
    text-align:center;
    min-width:120px; /* 缩小单元格最小宽度 */
    white-space:normal;
    font-size:13px; /* 缩小单元格字体 */
}
/* 表头基础样式 */
th {background:#f8f8f8;font-weight:bold;cursor:pointer;}

/* 日期表头样式 */
.date-header {background:#ffd966;font-weight:bold;}
/* 今日日期高亮样式 */
.date-header.active-highlight {font-weight:bold!important;background:#ffc107;}

/* 班次列样式 */
.shift-type {background:#fce5cd;font-weight:bold;cursor:default;}

/* 单元格高亮基础样式 */
.cell-highlight {filter:brightness(92%);font-weight:normal!important;}
/* 早班高亮样式 */
.cell-highlight.morning-shift {background:#e6f7ff!important;filter:none;}
/* 晚班高亮样式 */
.cell-highlight.evening-shift {background:#fff0f0!important;filter:none;}

/* 星期文字样式 */
.lunar-date {font-size:11px;color:#666;margin-top:3px;white-space:normal;}
.lunar-date {color:#666;}
/* 周末文字样式 */
.lunar-date.weekend {color:#c0392b;font-weight:600;}

/* 今日标记样式 */
.today-marker {color:#2ecc71;margin-right:4px;}

/* 调休人员样式 */
.rest-person {color:#c0392b;font-weight:normal!important;}

/* 今日单元格内容排版 */
.today-cell-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1.4;
}
/* 今日单元格班次文字 */
.today-cell-shift {
    font-size:11px;
    color:#666;
    margin-bottom:3px;
    font-weight:bold;
}
/* 今日单元格姓名文字 */
.today-cell-name {
    font-size:12px;
}

/* 双人值班时第一个名字样式 */
.first-person {color:#0066cc;}

/* ===================== 移动端响应式样式 ===================== */
/* 移动端样式保持原样，不做修改 */
@media (max-width:768px) {
    th,td {
        min-width:100px;
        padding:8px 4px;
        font-size:12px;
        white-space:normal;
    }
    .today-cell-shift {
        font-size:10px;
    }
    .today-cell-name {
        font-size:12px;
    }
    /* 统计表格移动端优化 */
    .stat-table {
        min-width: 550px;
        font-size: 11px;
    }
    .stat-table th, .stat-table td {
        padding: 5px 4px;
    }
}

/* ===================== 值班统计卡片样式 ===================== */
/* 统计卡片容器 */
.stat-card {
  padding: 0;
}
/* 统计卡片标题栏 */
.stat-card-header {
  background:#4285f4; /* 统计卡片标题栏颜色，与值班表区分 */
  color:#fff;
  text-align:center;
  padding:12px 15px; /* 缩小标题内边距 */
  font-size:18px; /* 缩小标题字体 */
  font-weight:bold;
}
/* 统计内容区域 */
.stat-section {
    padding:12px 15px; /* 缩小内边距 */
    background:#fff;
}
/* 统计周期文字 */
.stat-period {
    font-size:11px; /* 缩小字体 */
    color:#666;
    text-align:center;
    margin-bottom:8px;
}
/* 统计表格滚动容器 */
.stat-table-wrapper {
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 8px;
}
/* 统计表格样式 */
.stat-table {
    min-width: 500px; /* 缩小最小宽度 */
    border-collapse:collapse;
    font-size:11px; /* 缩小字体 */
    width: 100%;
}
/* 统计表格单元格样式 */
.stat-table th,
.stat-table td {
    border:1px solid #ccc;
    padding:5px 4px; /* 缩小内边距 */
    text-align:center;
    white-space: nowrap;
}
/* 统计表格表头样式 */
.stat-table th {
    background:#f2f2f2;
}
/* 统计表格姓名单元格样式（可点击） */
.stat-name-cell {
    cursor:pointer;
    color:#0066cc;
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: all 0.2s ease;
}
/* 姓名单元格hover效果 */
.stat-name-cell:hover {
    color:#004999;
    border-bottom: 1px solid #004999;
}

/* ===================== 弹窗样式 ===================== */
/* 弹窗遮罩层 */
.modal-overlay {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
    display:none;
}
/* 弹窗内容容器 */
.modal-content {
    background:#fff;
    border-radius:8px;
    width:90%;
    max-width:600px;
    max-height:80vh;
    overflow-y:auto;
    padding:20px;
}
/* 弹窗头部 */
.modal-header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
    padding-bottom:10px;
    border-bottom:1px solid #eee;
}
/* 弹窗标题 */
.modal-title {
    font-size:18px;
    font-weight:bold;
    color:#333;
}
/* 弹窗关闭按钮 */
.modal-close {
    width:30px;
    height:30px;
    line-height:30px;
    text-align:center;
    border-radius:50%;
    background:#f5f5f5;
    cursor:pointer;
    font-size:16px;
    color:#666;
}
/* 关闭按钮hover效果 */
.modal-close:hover {
    background:#eee;
    color:#333;
}
/* 弹窗内容区域 */
.modal-body {
    font-size:14px;
}
/* 详情表格样式 */
.detail-table {
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}
/* 详情表格单元格样式 */
.detail-table th,
.detail-table td {
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}
/* 详情表格表头样式 */
.detail-table th {
    background:#f8f8f8;
    font-size:13px;
}
/* 详情表格内容样式 */
.detail-table td {
    font-size:13px;
}
/* 白班类型文字 */
.shift-type-day {
    color:#27ae60;
    font-weight:bold;
}
/* 夜班类型文字 */
.shift-type-night {
    color:#e74c3c;
    font-weight:bold;
}
</style>
</head>
<body>

<!-- 页面主容器：包含两个独立卡片 -->
<div class="page-container">
  <!-- 第一个卡片：消防控制室值班表 -->
  <div class="card schedule-card">
    <h1>消防控制室值班表</h1>
    <div class="table-wrapper" id="tableWrapper">
      <table>
        <thead>
          <tr id="header-row">
            <th>班次</th>
          </tr>
        </thead>
        <tbody>
          <tr><td class="shift-type">早班（大客）</td></tr>
          <tr><td class="shift-type">早班（轻客）</td></tr>
          <tr><td class="shift-type">晚班（大客）</td></tr>
          <tr><td class="shift-type">晚班（轻客）</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 第二个卡片：人员值班时长统计 -->
  <div class="card stat-card">
    <div class="stat-card-header">人员值班时长统计</div>
    <div class="stat-section">
      <div class="stat-period" id="statPeriod"></div>
      <div class="stat-table-wrapper">
        <table class="stat-table">
          <thead>
            <tr>
              <th>姓名</th>
              <th>白班天数</th>
              <th>夜班天数</th>
              <th>白班小时</th>
              <th>夜班小时</th>
              <th>总小时</th>
            </tr>
          </thead>
          <tbody id="statBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- 详情弹窗：点击统计表格姓名时显示 -->
<div class="modal-overlay" id="detailModal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">XXX 值班详情</div>
      <div class="modal-close" id="modalClose">×</div>
    </div>
    <div class="modal-body">
      <div id="modalPeriod"></div>
      <table class="detail-table">
        <thead>
          <tr>
            <th>日期</th>
            <th>星期</th>
            <th>班次类型</th>
            <th>具体班次</th>
          </tr>
        </thead>
        <tbody id="detailTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// ===================== 全局配置和变量 =====================
// 自动刷新时间：300000毫秒 = 5分钟（原代码注释写1分钟是错误的）
setInterval(() => location.reload(), 300000);

// 班次时长配置（可根据实际情况修改）
const DAY_HOUR = 8;    // 白班每班次小时数
const NIGHT_HOUR = 15; // 夜班每班次小时数

// 全局存储变量
let globalScheduleRecords = []; // 存储完整的排班记录
let globalStatPeriod = {};      // 存储统计周期信息

// ===================== 统计周期计算函数 =====================
/**
 * 获取统计周期：上月26日 ~ 本月25日/今日
 * @returns {Object} 包含开始时间、结束时间及格式化字符串的对象
 */
function getStatPeriod() {
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth();
  const d = now.getDate();

  // 开始日期：上月26日
  let start = new Date(y, m - 1, 26);
  // 结束日期：如果当前日期≤25，结束到今日；否则到本月25日
  let end;
  if (d <= 25) {
    end = new Date(y, m, d);
  } else {
    end = new Date(y, m, 25);
  }

  // 日期格式化函数：YYYY-MM-DD
  function fmt(dt) {
    return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,0)}-${String(dt.getDate()).padStart(2,0)}`;
  }
  
  // 返回周期信息
  return { 
    start, 
    end, 
    startStr: fmt(start), 
    endStr: fmt(end),
    startDate: start,
    endDate: end
  };
}

// ===================== 日期处理函数 =====================
/**
 * 解析日期字符串（如：3月14日）为Date对象
 * @param {string} s - 日期字符串
 * @param {Date} baseDate - 基准日期（用于确定年份）
 * @returns {Date} 解析后的Date对象
 */
function parseDayStr(s, baseDate) {
  const [m, d] = s.replace('日','').split('月').map(Number);
  const y = baseDate.getFullYear();
  return new Date(y, m-1, d);
}

// ===================== 姓名处理函数 =====================
/**
 * 清理姓名字符串：去除HTML标签和首尾空格
 * @param {string} str - 原始姓名字符串
 * @returns {string} 清理后的姓名
 */
function cleanName(str) {
  if (!str) return '';
  return str
    .replace(/<[^>]+>/g, '') // 移除所有HTML标签
    .trim(); // 去除首尾空格
}

/**
 * 拆分姓名：支持 张三、李四 格式的姓名拆分
 * @param {string} str - 原始姓名字符串
 * @returns {Array} 拆分后的姓名数组
 */
function splitNames(str) {
  return cleanName(str)
    .split(/、|，|,/) // 支持顿号、逗号、英文逗号分隔
    .map(n => n.trim()) // 去除每个姓名的首尾空格
    .filter(n => n); // 过滤空字符串
}

// ===================== 统计计算核心函数 =====================
/**
 * 计算人员值班统计数据
 * @param {Array} records - 排班记录数组
 * @param {Object} period - 统计周期对象
 * @returns {Object} 包含统计列表的对象
 */
function calcStats(records, period) {
  // 存储每个人的统计数据
  const map = {};

  // 遍历每条排班记录
  records.forEach(rec => {
    const { dateStr, weekStr, dayBus, dayLight, nightBus, nightLight } = rec;
    // 解析日期并判断是否在统计周期内
    const day = parseDayStr(dateStr, period.start);
    if (day < period.start || day > period.end) return;

    // 处理白班数据
    [
      {name: dayBus, shift: '早班（大客）', type: '白班'},
      {name: dayLight, shift: '早班（轻客）', type: '白班'}
    ].forEach(item => {
      const names = splitNames(item.name);
      names.forEach(name => {
        // 初始化统计数据
        if (!map[name]) map[name] = { day:0, night:0, details: [] };
        // 白班天数+1
        map[name].day +=1;
        // 记录详情
        map[name].details.push({
          dateStr,
          weekStr,
          shiftType: item.type,
          shiftName: item.shift
        });
      });
    });

    // 处理夜班数据
    [
      {name: nightBus, shift: '晚班（大客）', type: '夜班'},
      {name: nightLight, shift: '晚班（轻客）', type: '夜班'}
    ].forEach(item => {
      const names = splitNames(item.name);
      names.forEach(name => {
        // 初始化统计数据
        if (!map[name]) map[name] = { day:0, night:0, details: [] };
        // 夜班天数+1
        map[name].night +=1;
        // 记录详情
        map[name].details.push({
          dateStr,
          weekStr,
          shiftType: item.type,
          shiftName: item.shift
        });
      });
    });
  });

  // 转换为排序后的统计列表
  const list = Object.entries(map).map(([name, o]) => ({
    name,
    dayCnt: o.day,               // 白班天数
    nightCnt: o.night,           // 夜班天数
    dayH: o.day * DAY_HOUR,      // 白班小时数
    nightH: o.night * NIGHT_HOUR,// 夜班小时数
    totalH: o.day*DAY_HOUR + o.night*NIGHT_HOUR, // 总小时数
    // 详情按日期排序
    details: o.details.sort((a,b) => {
      const d1 = parseDayStr(a.dateStr, globalStatPeriod.start);
      const d2 = parseDayStr(b.dateStr, globalStatPeriod.start);
      return d1 - d2;
    })
  })).sort((a,b) => {
    // 按总时长从高到低排序，时长相同按姓名拼音排序
    if (b.totalH !== a.totalH) {
      return b.totalH - a.totalH;
    } else {
      return a.name.localeCompare(b.name, 'zh-CN', { sensitivity: 'accent' });
    }
  });

  return { list };
}

// ===================== 统计表格渲染函数 =====================
/**
 * 渲染值班统计表格
 * @param {Array} records - 排班记录数组
 * @param {Object} period - 统计周期对象
 */
function renderStats(records, period) {
  // 设置统计周期文字
  document.getElementById('statPeriod').textContent = 
    `周期：${period.startStr} 至 ${period.endStr} | 只记录排班表时长，请假或调休要根据实际调整`;

  // 获取统计表格tbody元素
  const tbody = document.getElementById('statBody');
  tbody.innerHTML = ''; // 清空原有内容

  // 计算统计数据
  const stats = calcStats(records, period);
  
  // 渲染每条统计记录
  stats.list.forEach(item => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="stat-name-cell" data-name="${item.name}">${item.name}</td>
      <td>${item.dayCnt}</td>
      <td>${item.nightCnt}</td>
      <td>${item.dayH}</td>
      <td>${item.nightH}</td>
      <td>${item.totalH}</td>
    `;
    tbody.appendChild(tr);

    // 存储人员详情数据到DOM属性（JSON字符串）
    tr.querySelector('.stat-name-cell').dataset.details = JSON.stringify(item.details);
  });

  // 绑定姓名单元格点击事件（查看详情）
  document.querySelectorAll('.stat-name-cell').forEach(cell => {
    cell.addEventListener('click', function() {
      const name = this.dataset.name;
      const details = JSON.parse(this.dataset.details);
      showDetailModal(name, details, period);
    });
  });
}

// ===================== 详情弹窗函数 =====================
/**
 * 显示值班详情弹窗
 * @param {string} name - 人员姓名
 * @param {Array} details - 值班详情数组
 * @param {Object} period - 统计周期对象
 */
function showDetailModal(name, details, period) {
  // 获取弹窗相关元素
  const modal = document.getElementById('detailModal');
  const modalTitle = document.getElementById('modalTitle');
  const modalPeriod = document.getElementById('modalPeriod');
  const detailTableBody = document.getElementById('detailTableBody');

  // 设置弹窗标题和周期
  modalTitle.textContent = `${name} 值班详情`;
  modalPeriod.textContent = `统计周期：${period.startStr} 至 ${period.endStr}`;

  // 渲染详情表格
  detailTableBody.innerHTML = '';
  if (details.length === 0) {
    // 无记录时显示提示
    const tr = document.createElement('tr');
    tr.innerHTML = `<td colspan="4">暂无值班记录</td>`;
    detailTableBody.appendChild(tr);
  } else {
    // 渲染每条详情记录
    details.forEach(item => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${item.dateStr}</td>
        <td>${item.weekStr}</td>
        <td class="${item.shiftType === '白班' ? 'shift-type-day' : 'shift-type-night'}">${item.shiftType}</td>
        <td>${item.shiftName}</td>
      `;
      detailTableBody.appendChild(tr);
    });
  }

  // 显示弹窗
  modal.style.display = 'flex';
}

// ===================== 弹窗事件绑定 =====================
// 关闭弹窗按钮点击事件
document.getElementById('modalClose').addEventListener('click', function() {
  document.getElementById('detailModal').style.display = 'none';
});

// 点击弹窗外部关闭弹窗
document.getElementById('detailModal').addEventListener('click', function(e) {
  if (e.target === this) {
    this.style.display = 'none';
  }
});

// ===================== 值班表交互函数 =====================
/**
 * 获取今日日期字符串（如：3月14日）
 * @returns {string} 今日日期字符串
 */
function getTodayText() {
  const t = new Date();
  return `${t.getMonth()+1}月${t.getDate()}日`;
}

/**
 * 滚动到指定列位置
 * @param {HTMLElement} el - 目标列元素
 */
function scrollToColumn(el) {
  const wrap = document.getElementById('tableWrapper');
  // 计算滚动位置，使目标列居中显示
  wrap.scrollLeft = el.offsetLeft - wrap.clientWidth/2 + el.offsetWidth/2;
}

/**
 * 格式化双人姓名：第一个名字显示为蓝色
 * @param {string} text - 原始姓名字符串
 * @returns {string} 格式化后的HTML字符串
 */
function formatDoubleName(text) {
  if (!text.includes('、')) return text;
  const [a,...b] = text.split('、');
  return `<span class="first-person">${a}</span>、${b.join('、')}`;
}

/**
 * 清除所有列的高亮样式
 */
function clearAllHighlight() {
  // 清除日期表头高亮
  document.querySelectorAll('.date-header').forEach(h => {
    h.classList.remove('active-highlight');
    h.innerHTML = h.innerHTML.replace('<span class="today-marker">✔</span>', '');
  });
  // 清除单元格高亮
  document.querySelectorAll('td.cell-highlight').forEach(c => {
    c.classList.remove('cell-highlight','morning-shift','evening-shift');
    // 恢复原始内容
    if (c.dataset.originalContent) c.innerHTML = c.dataset.originalContent;
  });
}

/**
 * 高亮指定列
 * @param {number} colIndex - 列索引
 */
function highlightColumn(colIndex) {
  const headerRow = document.getElementById('header-row');
  const rows = document.querySelectorAll('tbody tr');
  
  // 高亮日期表头
  const th = headerRow.children[colIndex];
  if (th) {
    th.classList.add('active-highlight');
    // 添加今日标记
    th.innerHTML = `<span class="today-marker">✔</span>${th.innerHTML.replace('<span class="today-marker">✔</span>','')}`;
    // 滚动到该列
    scrollToColumn(th);
  }
  
  // 高亮对应单元格
  rows.forEach((r,i) => {
    const td = r.children[colIndex];
    if (!td || !td.dataset.originalContent) return;
    
    // 添加高亮类
    td.classList.add('cell-highlight', i<2 ? 'morning-shift' : 'evening-shift');
    
    // 格式化单元格内容
    let txt = td.dataset.originalContent;
    if (i === 2) txt = formatDoubleName(txt); // 晚班（大客）特殊处理
    
    // 重新排版单元格内容
    td.innerHTML = `
      <div class="today-cell-content">
        <div class="today-cell-shift">${['早班（大客）','早班（轻客）','晚班（大客）','晚班（轻客）'][i]}</div>
        <div class="today-cell-name">${txt}</div>
      </div>
    `;
  });
}

// ===================== 核心加载函数 =====================
/**
 * 加载并渲染排班表数据
 */
async function loadSchedule() {
  try {
    // 从info.txt文件加载排班数据
    const rsp = await fetch('info.txt');
    const txt = await rsp.text();
    
    // 解析排班数据：按空行分割成日期块，过滤有效数据
    const blocks = txt.split(/\n\s*\n/)
      .map(b=>b.trim().split('\n').map(l=>l.trim()).filter(Boolean))
      .filter(b=>b.length>=6);

    // 获取DOM元素
    const headerRow = document.getElementById('header-row');
    const tbodyRows = document.querySelectorAll('tbody tr');
    const todayText = getTodayText(); // 获取今日日期字符串
    let todayCol = -1; // 今日列索引
    const scheduleRecords = []; // 存储解析后的排班记录

    // 处理每个日期块
    blocks.forEach((block, idx) => {
      const [dateStr, weekStr, s1,s2,s3,s4] = block;
      const col = idx+1; // 列索引（从1开始，0是班次列）
      
      // 标记今日列
      if (dateStr === todayText) todayCol = col;

      // 解析每行数据：提取括号后的内容
      function parseLine(l) {
        const v = l.split('）')[1]||'';
        return v.includes('<rest>') ? v : v.trim();
      }
      
      // 解析四个班次的数据
      const data = [parseLine(s1), parseLine(s2), parseLine(s3), parseLine(s4)];
      
      // 存储排班记录
      scheduleRecords.push({
        dateStr,
        weekStr,
        dayBus:data[0],      // 早班（大客）
        dayLight:data[1],    // 早班（轻客）
        nightBus:data[2],    // 晚班（大客）
        nightLight:data[3]   // 晚班（轻客）
      });

      // 创建日期表头单元格
      const th = document.createElement('th');
      th.className = 'date-header';
      th.innerHTML = `${dateStr}<br><span class="lunar-date ${weekStr.includes('星期六')||weekStr.includes('星期日')?'weekend':''}">${weekStr}</span>`;
      // 绑定点击事件：点击日期高亮对应列
      th.onclick = () => { clearAllHighlight(); highlightColumn(col); };
      headerRow.appendChild(th);

      // 创建每个班次的单元格
      tbodyRows.forEach((tr,i) => {
        const td = document.createElement('td');
        td.innerHTML = data[i];
        td.dataset.originalContent = data[i]; // 存储原始内容用于恢复
        tr.appendChild(td);
      });
    });

    // 高亮今日列
    if (todayCol !== -1) highlightColumn(todayCol);

    // 存储全局数据
    globalScheduleRecords = scheduleRecords;
    globalStatPeriod = getStatPeriod();
    
    // 渲染统计表格
    renderStats(scheduleRecords, globalStatPeriod);

  } catch(e) {
    // 错误处理
    console.error('加载排班表失败：', e);
    alert('排班表加载失败，请检查info.txt文件是否存在或格式是否正确');
  }
}

// 页面加载完成后执行
window.onload = loadSchedule;
</script>
